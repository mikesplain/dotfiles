name: Nix Test Auto Rerun

on:
  workflow_run:
    workflows: ["Nix Test"]
    types: [completed]

permissions:
  actions: write
  contents: read

concurrency:
  group: nix-test-rerun-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  rerun-failed-job:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_branch == 'automation/flake-update' &&
      github.event.workflow_run.run_attempt == 1
    runs-on: ubuntu-latest
    steps:
      - name: Wait before retry
        run: sleep 900

      - name: Rerun failed matrix jobs
        uses: actions/github-script@v9
        with:
          script: |
            const runId = context.payload.workflow_run.id;
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: runId,
                per_page: 100,
              }
            );

            const relevantJobs = jobs.filter((job) => job.name.startsWith("tests ("));
            const failedJobs = relevantJobs.filter((job) => job.conclusion === "failure");
            const nonSuccessJobs = relevantJobs.filter((job) => job.conclusion !== "success");
            const retryableConclusions = new Set(["failure", "cancelled", "timed_out"]);
            const retryableJobs = nonSuccessJobs.filter((job) =>
              retryableConclusions.has(job.conclusion)
            );

            core.info(
              `Run ${runId} has ${relevantJobs.length} matrix jobs, ` +
              `${failedJobs.length} failed jobs, and ${nonSuccessJobs.length} non-success jobs.`
            );

            if (relevantJobs.length === 0) {
              core.info("No matching matrix jobs found; skipping rerun.");
              return;
            }

            if (retryableJobs.length === 0) {
              core.info("No retryable failed jobs found; skipping rerun.");
              return;
            }

            if (retryableJobs.length !== nonSuccessJobs.length) {
              core.info(
                "Skipping rerun because at least one non-success job has a non-retryable conclusion."
              );
              return;
            }

            core.info(
              `Rerunning ${retryableJobs.length} matrix job(s): ` +
              retryableJobs.map((job) => `${job.id} (${job.name})`).join(", ")
            );

            for (const job of retryableJobs) {
              await github.request(
                "POST /repos/{owner}/{repo}/actions/jobs/{job_id}/rerun",
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  job_id: job.id,
                }
              );
            }
